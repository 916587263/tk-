<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok 竞争对手分析系统</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎵 TikTok 竞争对手分析</h1>
            <p>输入关键词 + 目标地区，自动抓取账号、视频、评论数据，AI 智能分析商业机会</p>
        </div>

        <!-- 配置表单 -->
        <div class="card" id="configPanel">
            <div class="card-title"><span class="icon">⚙️</span> 分析配置</div>
            <div class="form-grid">
                <div class="form-group full">
                    <label>🔑 搜索关键词</label>
                    <textarea id="keywords" placeholder="每行或逗号分隔，例如：&#10;skincare, beauty tools, makeup tutorial&#10;护肤品, 美妆工具, 家居好物"></textarea>
                    <div class="hint">支持中英文，多个关键词用逗号或换行分隔</div>
                </div>
                <div class="form-group">
                    <label>🌍 目标客户地区</label>
                    <input type="text" id="region" placeholder="例如：US, UK, 东南亚, 日本">
                    <div class="hint">留空则不限制地区</div>
                </div>
                <div class="form-group">
                    <label>🌐 浏览器选择</label>
                    <select id="browser">
                        <option value="msedge">Microsoft Edge</option>
                        <option value="chrome">Google Chrome</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🔗 CDP 连接模式（推荐）</label>
                    <select id="cdpMode">
                        <option value="0">普通模式（Playwright 启动）</option>
                        <option value="9222">CDP 连接 (端口 9222)</option>
                        <option value="9223">CDP 连接 (端口 9223)</option>
                    </select>
                    <div class="hint">
                        <strong>推荐 CDP 模式</strong>：关闭浏览器后运行 <code>msedge --remote-debugging-port=9222</code>，
                        在弹出的浏览器中登录 TikTok，然后选择 CDP 模式启动分析。可大幅减少反爬检测。
                    </div>
                </div>
                <div class="form-group">
                    <label>📊 每关键词抓取账号数</label>
                    <input type="number" id="accountsPerKeyword" value="10" min="1" max="50">
                </div>
                <div class="form-group">
                    <label>🎬 每账号抓取视频数</label>
                    <input type="number" id="videosPerAccount" value="30" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>💬 热门视频评论数</label>
                    <input type="number" id="commentsPerVideo" value="200" min="1" max="500">
                </div>
            </div>

            <!-- AI 分析配置 -->
            <div class="card-title" style="margin-top: 20px;"><span class="icon">🤖</span> AI 分析配置（可选）</div>
            <div class="form-grid">
                <div class="form-group full">
                    <label>OpenAI API Key</label>
                    <input type="password" id="openaiKey" placeholder="sk-...">
                </div>
                <div class="form-group">
                    <label>API Base URL（可选）</label>
                    <input type="text" id="openaiBaseUrl" placeholder="https://api.openai.com/v1">
                    <div class="hint">使用代理或第三方 API 时填写</div>
                </div>
                <div class="form-group">
                    <label>模型</label>
                    <select id="openaiModel">
                        <option value="gpt-4o">GPT-4o</option>
                        <option value="gpt-4o-mini">GPT-4o Mini</option>
                        <option value="gpt-4-turbo">GPT-4 Turbo</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-primary" id="startBtn" onclick="startAnalysis()">
                🚀 开始分析
            </button>
        </div>

        <!-- 进度面板 -->
        <div class="card progress-panel" id="progressPanel">
            <div class="card-title"><span class="icon">📡</span> 实时进度 <span class="progress-spinner" id="spinner"></span></div>
            <div class="progress-log" id="progressLog"></div>
        </div>

        <!-- 结果面板 -->
        <div class="results-panel" id="resultsPanel">
            <div class="card">
                <div class="card-title"><span class="icon">📈</span> 数据概览</div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="value" id="statAccounts">-</div><div class="label">分析账号</div></div>
                    <div class="stat-card"><div class="value" id="statVideos">-</div><div class="label">抓取视频</div></div>
                    <div class="stat-card"><div class="value" id="statComments">-</div><div class="label">抓取评论</div></div>
                    <div class="stat-card"><div class="value" id="statKeywords">-</div><div class="label">关键词数</div></div>
                </div>
            </div>

            <!-- 下载 -->
            <div class="card">
                <div class="card-title"><span class="icon">📥</span> 下载报告</div>
                <div class="download-bar" id="downloadBar"></div>
            </div>

            <!-- 详情标签 -->
            <div class="card">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('accounts')">👥 账号排行</button>
                    <button class="tab-btn" onclick="switchTab('videos')">🔥 热门视频</button>
                    <button class="tab-btn" onclick="switchTab('analysis')">🤖 AI 分析</button>
                </div>
                <div class="tab-content active" id="tab-accounts">
                    <table class="accounts-table" id="accountsTable"></table>
                </div>
                <div class="tab-content" id="tab-videos">
                    <table class="videos-table" id="videosTable"></table>
                </div>
                <div class="tab-content" id="tab-analysis">
                    <div id="analysisContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTaskId = null;
        let eventSource = null;

        function startAnalysis() {
            const keywords = document.getElementById('keywords').value.trim();
            if (!keywords) { alert('请输入至少一个关键词'); return; }

            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 启动中...';

            document.getElementById('progressPanel').classList.add('active');
            document.getElementById('progressLog').innerHTML = '';
            document.getElementById('resultsPanel').classList.remove('active');

            const data = {
                keywords: keywords,
                region: document.getElementById('region').value.trim(),
                accounts_per_keyword: parseInt(document.getElementById('accountsPerKeyword').value) || 10,
                videos_per_account: parseInt(document.getElementById('videosPerAccount').value) || 30,
                comments_per_video: parseInt(document.getElementById('commentsPerVideo').value) || 200,
                browser: document.getElementById('browser').value,
                headless: false,
                cdp_port: parseInt(document.getElementById('cdpMode').value) || 0,
                openai_key: document.getElementById('openaiKey').value.trim(),
                openai_base_url: document.getElementById('openaiBaseUrl').value.trim(),
                openai_model: document.getElementById('openaiModel').value,
                use_ai: true
            };

            fetch('/api/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(res => {
                if (res.error) { alert(res.error); btn.disabled = false; btn.textContent = '🚀 开始分析'; return; }
                currentTaskId = res.task_id;
                connectSSE(currentTaskId);
            })
            .catch(err => {
                alert('启动失败: ' + err);
                btn.disabled = false;
                btn.textContent = '🚀 开始分析';
            });
        }

        function connectSSE(taskId) {
            if (eventSource) eventSource.close();
            eventSource = new EventSource('/api/progress/' + taskId);

            eventSource.onmessage = function(e) {
                const evt = JSON.parse(e.data);
                if (evt.msg === 'heartbeat') return;
                addLogEntry(evt.msg, evt.data);

                if (evt.data && evt.data.done) {
                    eventSource.close();
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').textContent = '🚀 开始分析';
                    document.getElementById('spinner').style.display = 'none';
                    loadResults(taskId);
                }
                if (evt.data && evt.data.error) {
                    eventSource.close();
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').textContent = '🚀 重新开始';
                    document.getElementById('spinner').style.display = 'none';
                }
            };

            eventSource.onerror = function() {
                // 自动重连
            };
        }

        function addLogEntry(msg, data) {
            const log = document.getElementById('progressLog');
            const now = new Date().toLocaleTimeString();
            let cls = '';
            if (data && data.error) cls = 'error';
            if (data && data.done) cls = 'success';

            const div = document.createElement('div');
            div.className = 'entry ' + cls;
            div.innerHTML = '<span class="time">[' + now + ']</span><span class="msg">' + escapeHtml(msg) + '</span>';
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function loadResults(taskId) {
            document.getElementById('resultsPanel').classList.add('active');

            fetch('/api/results/' + taskId)
                .then(r => r.json())
                .then(data => {
                    // Stats
                    document.getElementById('statAccounts').textContent = data.summary.accounts;
                    document.getElementById('statVideos').textContent = data.summary.videos;
                    document.getElementById('statComments').textContent = data.summary.comments;
                    document.getElementById('statKeywords').textContent = data.accounts ? data.accounts.length : 0;

                    // Download buttons
                    const bar = document.getElementById('downloadBar');
                    bar.innerHTML = '';
                    const files = [
                        { type: 'report', label: '📄 Markdown 报告', cls: 'btn-primary' },
                        { type: 'accounts', label: '📊 账号 CSV', cls: 'btn-secondary' },
                        { type: 'videos', label: '🎬 视频 CSV', cls: 'btn-secondary' },
                        { type: 'comments', label: '💬 评论 CSV', cls: 'btn-secondary' },
                        { type: 'analysis', label: '🤖 分析 CSV', cls: 'btn-outline' },
                    ];
                    files.forEach(f => {
                        const a = document.createElement('a');
                        a.href = '/api/download/' + taskId + '/' + f.type;
                        a.className = 'btn btn-sm ' + f.cls;
                        a.textContent = f.label;
                        a.download = '';
                        bar.appendChild(a);
                    });

                    // Accounts table
                    let accHtml = '<thead><tr><th>#</th><th>账号</th><th>昵称</th><th>粉丝</th><th>点赞</th><th>认证</th><th>简介</th></tr></thead><tbody>';
                    const accounts = (data.accounts || []).sort((a,b) => (b.follower_count||0) - (a.follower_count||0));
                    accounts.forEach((a, i) => {
                        accHtml += '<tr>' +
                            '<td class="rank">' + (i+1) + '</td>' +
                            '<td><a href="https://tiktok.com/@' + (a.username||'') + '" target="_blank" style="color:var(--cyan)">@' + (a.username||'') + '</a></td>' +
                            '<td>' + (a.nickname||'') + '</td>' +
                            '<td class="count-badge high">' + fmtNum(a.follower_count) + '</td>' +
                            '<td class="count-badge">' + fmtNum(a.like_count) + '</td>' +
                            '<td>' + (a.verified ? '✅' : '-') + '</td>' +
                            '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (a.bio||'') + '</td>' +
                            '</tr>';
                    });
                    accHtml += '</tbody>';
                    document.getElementById('accountsTable').innerHTML = accHtml;

                    // Videos table
                    let vidHtml = '<thead><tr><th>#</th><th>账号</th><th>标题</th><th>标签</th><th>👍 点赞</th><th>💬 评论</th><th>🔄 分享</th></tr></thead><tbody>';
                    const videos = (data.videos || []).sort((a,b) => (b.digg_count||0) - (a.digg_count||0)).slice(0, 20);
                    videos.forEach((v, i) => {
                        const tags = (v.tags||[]).slice(0, 5).map(t => '<span class="tag-badge">#'+t+'</span>').join(' ');
                        vidHtml += '<tr>' +
                            '<td class="rank">' + (i+1) + '</td>' +
                            '<td>@' + (v.account_username||'') + '</td>' +
                            '<td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (v.desc||'') + '</td>' +
                            '<td style="max-width:200px">' + tags + '</td>' +
                            '<td class="count-badge high">' + fmtNum(v.digg_count) + '</td>' +
                            '<td class="count-badge">' + fmtNum(v.comment_count) + '</td>' +
                            '<td class="count-badge">' + fmtNum(v.share_count) + '</td>' +
                            '</tr>';
                    });
                    vidHtml += '</tbody>';
                    document.getElementById('videosTable').innerHTML = vidHtml;

                    // Analysis
                    if (data.analysis && !data.analysis.error) {
                        let anaHtml = '';
                        const dims = [
                            { key: 'business_needs', label: '💼 商业需求', color: 'var(--cyan)' },
                            { key: 'purchase_needs', label: '🛒 采购需求', color: 'var(--green)' },
                            { key: 'pain_points', label: '😤 用户痛点', color: 'var(--accent)' },
                        ];
                        dims.forEach(dim => {
                            const items = data.analysis[dim.key] || [];
                            if (items.length === 0) return;
                            anaHtml += '<h3 style="color:'+dim.color+';margin:16px 0 8px">' + dim.label + '</h3>';
                            items.forEach(item => {
                                anaHtml += '<div class="analysis-item">' +
                                    '<div class="finding">' + (item.finding||'') + '</div>' +
                                    '<div class="meta"><span class="priority-stars">' + '⭐'.repeat(item.priority||1) + '</span> 优先级: ' + (item.priority||0) + '/10</div>' +
                                    '<div class="evidence">📌 证据: ' + (item.evidence||'') + '</div>' +
                                    '<div class="suggestion">💡 建议: ' + (item.suggestion||'') + '</div>' +
                                    '</div>';
                            });
                        });
                        if (data.analysis.summary) {
                            anaHtml += '<div class="analysis-item" style="border-color:var(--cyan)">' +
                                '<div class="finding">📋 总结</div>' +
                                '<div style="font-size:0.95rem;margin-top:4px">' + data.analysis.summary + '</div>' +
                                '</div>';
                        }
                        document.getElementById('analysisContent').innerHTML = anaHtml || '<p style="color:var(--text-muted)">暂无分析结果</p>';
                    } else if (data.analysis && data.analysis.error) {
                        document.getElementById('analysisContent').innerHTML = '<p style="color:var(--accent)">AI 分析失败: ' + data.analysis.error + '</p>';
                    } else {
                        document.getElementById('analysisContent').innerHTML = '<p style="color:var(--text-muted)">未启用 AI 分析或未设置 API Key</p>';
                    }
                });
        }

        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector('.tab-btn[onclick*="'+name+'"]').classList.add('active');
            document.getElementById('tab-'+name).classList.add('active');
        }

        function fmtNum(n) {
            if (n == null || n === 0) return '0';
            n = parseInt(n);
            if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
            if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
            return n.toLocaleString();
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    </script>
</body>
</html>
