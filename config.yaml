# ============================================================
# TikTok 外贸行业对标视频发现系统 - 配置文件
# 所有过滤、评分、意图检测参数均可在此调整
# 修改后下次启动分析自动生效，无需重启 Web 服务
# ============================================================

# ── LLM 总开关 ──
# enable_llm=false 时使用纯规则引擎 (QuickIntentScanner), 零 API 成本
# enable_llm=true  时启用 CommentClassifier + AI 分析增强
enable_llm: false                   # 测试阶段默认关闭
llm_provider: deepseek              # openai | deepseek | 兼容 OpenAI 协议的任意服务
llm_model: deepseek-chat            # deepseek-chat | gpt-4o-mini | gpt-4o
# deepseek-chat 约 1/10 的 OpenAI 成本, 1M input ~$0.14
llm_base_url: https://api.deepseek.com/v1

# ── 阶段 3: 评论 LLM 分类 ──
# 批量 LLM 调用, 对阶段 2 筛选出的视频进行深度评论意图分类
comment_classifier:
  enabled: true
  videos_per_batch: 6              # 每批处理的视频数
  max_comments_per_video: 40       # 每个视频最多传入 LLM 的评论数
  model: gpt-4o-mini               # 分类任务用小模型降低成本
  temperature: 0.1                 # 低温度确保一致性
  # ── 阶段 3.5: 后分类轻量淘汰 ──
  # 在 CommentClassifier 之后淘汰意图信号过弱的视频,
  # 避免所有视频涌入 FinalScore 造成无效计算
  intent_filter_enabled: true
  intent_filter_min_ratio: 0.03    # intent_ratio < 3% AND
  intent_filter_min_actionable: 1  # actionable < 1 → 淘汰

# ── 阶段 4: FinalScore 终极统一评分 ──
# 仅对阶段 3 通过的最终候选视频评分 (≤10-20 条)
# 三权重: 产品相关度(30%) + 视频质量(30%) + 商业意图(40%)
# 商业意图维度在此处首次引入 (晚调 LLM)
final_scorer:
  enabled: true
  weight_product: 0.30
  weight_quality: 0.30
  weight_intent: 0.40
  intent_sub_ratio: 0.4            # intent_ratio 子权重
  intent_sub_quality: 0.4          # intent_quality 子权重
  intent_sub_diversity: 0.2        # intent_diversity 子权重
  tier_thresholds:
    S: 80
    A: 60
    B: 40
    C: 20
  top_reference_n: 20

# ── 阶段 1: QuickScore 无评论快速评分 ──
# 仅基于视频元数据 + 账号信息, 零评论依赖
# 目标: 尽早淘汰 ~70-80% 低价值视频
quick_scorer:
  enabled: true
  weight_relevance: 0.50            # 产品相关度权重
  weight_quality: 0.50              # 视频质量权重
  min_score: 20.0                   # 低于此分直接淘汰
  min_likes_no_comment: 5           # 无评论时最低点赞数
  play_benchmark: 100000            # 播放量基准 (50分参考线)
  engagement_benchmark: 0.05        # 互动率基准 (5%=50分)
  personal_account_penalty: 30.0    # 个人/娱乐号降分幅度
  # ── 商业白名单: 命中 ≥min_hits 个不同关键词 → 跳过硬淘汰 ──
  commercial_whitelist:
    - manufacturer
    - factory
    - supplier
    - oem
    - odm
    - moq
    - wholesale
    - distributor
    - importer
    - exporter
  commercial_whitelist_min_hits: 2
  industry_keywords:
    - factory
    - manufacturer
    - supplier
    - wholesale
    - export
    - factory direct
    - oem
    - odm
    - moq
    - manufacturing
    - production
    - distributor
    - importer
    - exporter
    - 工厂
    - 厂家
    - 供应商
    - 批发
    - 外贸
    - 生产
    - 制造
    - 出口
  personal_account_patterns:
    - fan account
    - fanpage
    - fan page
    - fandom
    - stan
    - updates
    - vlog
    - entertainment
    - 粉丝
    - 后援
    - 日常
    - 娱乐

# ── P0: 视频预筛选 (DEPRECATED — 由 QuickScorer 替代) ──
video_prefilter:
  enabled: true                  # 是否启用视频预筛选
  min_digg: 10                   # 最低点赞数（< 此值直接丢弃）
  min_comments: 1                # 最低评论数（=0 直接丢弃，无评论无法进行意图识别）
  min_plays: 100                 # 最低播放量（0=不过滤）

# ── P0: 账号过滤 ──
account_filter:
  enabled: false                 # 默认关闭，避免误杀有用账号
  min_followers: 0               # 最低粉丝数（0=不过滤）
  max_followers: 0               # 最高粉丝数
  min_likes: 0                   # 最低点赞总数
  max_likes: 0                   # 最高点赞总数
  min_videos: 0                  # 最低视频数
  max_videos: 0                  # 最高视频数
  min_engagement_rate: 0.0       # 最低互动率 (likes/followers)，如 0.01=1%
  require_verified: false        # 只要认证号
  require_bio: false             # 必须有简介
  require_avatar: false          # 必须有头像
  require_contact: false         # 简介必须有联系方式(邮箱/WhatsApp/网址)
  region_whitelist: []           # 只保留这些地区，如 ["US", "GB"]
  region_blacklist: []           # 排除这些地区
  language_whitelist: []         # 只保留这些语言，如 ["en", "zh"]
  bio_keywords: []               # 简介必须包含任一
  bio_keywords_all: []           # 简介必须包含全部
  bio_blacklist: []              # 简介含这些词则排除
  nickname_blacklist: []         # 昵称含这些词则排除
  username_blacklist: []         # 用户名含这些词则排除

# ── P1: 账号评分 ──
account_scorer:
  enabled: true
  weight_followers: 0.30         # 粉丝数权重
  weight_engagement: 0.25        # 互动率权重 (likes/followers)
  weight_verified: 0.10          # 认证加分
  weight_bio_quality: 0.10       # 简介完整度
  weight_video_count: 0.10       # 视频产量
  weight_consistency: 0.10       # 内容一致性
  weight_region_match: 0.05      # 地区匹配
  follower_benchmark: 10000      # B2B账号基准（10K粉丝已是不错的工厂号）
  like_benchmark: 100000         # B2B点赞基准
  video_benchmark: 200           # B2B视频数基准
  verified_bonus: 15.0
  region_match_bonus: 10.0
  target_regions: []             # 目标市场，如 ["US"]

# ── P2: 视频深度抓取 ──
video_scraping:
  enrich_top: 20                 # 对点赞 Top N 条视频进入详情页补充精确互动数据（0=跳过）

# ── P3: 视频过滤 ──
video_filter:
  enabled: false                 # 默认关闭
  min_plays: 0
  min_digg: 0
  min_comments: 0
  min_shares: 0
  min_engagement_rate: 0.0
  require_description: false
  require_tags: false
  min_description_length: 0
  min_tags: 0
  desc_blacklist: []
  tag_whitelist: []
  min_duration: 0
  max_duration: 0

# ── P3: 视频评分 ──
video_scorer:
  enabled: true
  weight_plays: 0.20             # 播放量
  weight_engagement: 0.30        # 总互动率
  weight_digg: 0.20              # 点赞
  weight_comment_rate: 0.15      # 评论率（话题性）
  weight_share_rate: 0.10        # 分享率（传播力）
  weight_quality: 0.05           # 内容质量
  play_benchmark: 100000
  digg_benchmark: 10000
  has_tags_bonus: 5.0
  has_description_bonus: 5.0
  min_description_length: 20
  optimal_duration_range: [15, 60]

# ── 爆款视频发现 ──
viral_detector:
  enabled: true
  viral_score_threshold: 60.0       # VideoScorer 评分 >= 此值视为爆款候选
  viral_virality_threshold: 3.0     # 病毒系数 >= 此值
  viral_engagement_threshold: 0.05  # 互动率 >= 5%
  min_plays_for_viral: 10000        # 最低播放量（过滤小样本噪声）
  global_top_n: 10                  # 全局爆款 Top N
  per_account_top_n: 5              # 每账号互动率 Top N
  tag_frequency_top_n: 20           # 高频标签取前 N
  engagement_benchmark_percentiles: [25, 50, 75]  # 互动率分位数

# ── P5: 外贸采购意图检测 ──
intent_detector:
  enabled: true
  min_confidence: 0.3
  max_intents_per_comment: 3
  enabled_categories:            # 启用的意图类别
    - price_inquiry
    - moq_inquiry
    - supplier_search
    - manufacturer_search
    - customization_request
    - sample_request
    - wholesale_request
    - shipping_request
  custom_keywords: {}            # 用户自定义关键词，如 {"price_inquiry": ["how much per unit", "unit cost"]}

# ── 对标参考视频评分 ──
reference_video_scorer:
  enabled: true
  weight_video_engagement: 0.25     # 视频互动质量（复用 VideoScorer 得分）
  weight_comment_quality: 0.25      # 评论质量（深度/率/长度）
  weight_intent_ratio: 0.35         # 采购意向评论占比（核心维度）
  weight_account_relevance: 0.15    # 账号行业相关度（bio/tags关键词命中）
  reference_tier_thresholds:        # 对标等级阈值
    S: 80
    A: 60
    B: 40
    C: 20
  top_reference_n: 20               # 输出 Top N 对标参考视频
  intent_ratio_benchmark: 0.10      # 采购意向占比基准（10%=50分）
  comment_quality_benchmark_rate: 0.02  # 评论率基准（2%=50分）
  comment_quality_min_length: 10    # 评论最小有效长度（字符）
  industry_keywords:                # 外贸行业关键词（账号行业相关度匹配）
    - factory
    - manufacturer
    - supplier
    - wholesale
    - export
    - factory direct
    - oem
    - manufacturing
    - production
    - 工厂
    - 厂家
    - 供应商
    - 批发
    - 外贸
    - 生产
    - 制造
    - 出口

# ── 关键词扩展 ──
# 三级扩展策略: compact(快速验证) / balanced(日常生产) / full(深度挖掘)
keyword_expansion:
  default_tier: balanced            # CLI默认 compact, Web默认 balanced
  cache_ttl_days: 7                 # 缓存有效期（天）
  max_keywords_per_tier:
    compact: 5
    balanced: 16
    full: 45

# ── P6: AI 分析增强 ──
ai_analysis:
  use_scored_data: true          # 是否将评分数据传入 AI 分析
  use_intent_data: true          # 是否将意图识别结果传入 AI 分析
  max_accounts_in_prompt: 20     # 传入 AI 的最大账号数
  max_videos_in_prompt: 30       # 传入 AI 的最大视频数
  max_comments_in_prompt: 200    # 传入 AI 的最大评论数
